spring.application.name=customer-service
server.port=8081

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/microservices_db?currentSchema=customer_schema}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:customer_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:customer123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPAd
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka Client yeh jb eureka docker py ho ga tb
#eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}


eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Logging
logging.level.com.demo.customer_service=DEBUG