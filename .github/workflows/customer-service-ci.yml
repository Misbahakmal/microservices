name: Customer Service CI

# Only runs when customer_service files actually change - keeps CI fast
# and avoids running this pipeline for changes to other services.
on:
  push:
    branches: [main]
    paths:
      - 'customer_service/**'
      - '.github/workflows/customer-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'customer_service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Caches ~/.m2 between runs so dependencies aren't re-downloaded
      # on every push - speeds up CI significantly after the first run.
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('customer_service/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # `verify` runs both unit tests (fast) and the Testcontainers-based
      # integration test (needs Docker - available by default on
      # ubuntu-latest runners, unlike the local machine issue we hit).
      - name: Build and run tests
        working-directory: ./customer_service
        run: mvn clean verify

      # Publishes a readable test report as a build artifact, even if
      # tests fail - useful for debugging directly from the GitHub UI
      # instead of scrolling through raw console logs.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-service-test-results
          path: customer_service/target/surefire-reports/


