name: Customer Service CI

on:
  push:
    branches: [main]
    paths:
      - 'customer_service/**'
      - 'init.sql'
      - 'docker-compose.yaml'
      - '.github/workflows/customer-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'customer_service/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: start the real infrastructure FIRST, using the same
      # docker-compose.yaml and init.sql that you use locally - no
      # duplicated config, no Testcontainers library involved at all.
      - name: Start Postgres and Eureka Server
        run: docker compose up -d postgres eureka-server

      # Step 2: wait until Postgres is actually ready to accept
      # connections before Maven tries to use it - "docker compose up -d"
      # returns immediately, it does NOT wait for the container to be
      # healthy inside.
      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            if docker exec postgres-db pg_isready -U postgres > /dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      # Step 3: same check for Eureka Server's health endpoint.
      - name: Wait for Eureka Server to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8761/actuator/health > /dev/null 2>&1; then
              echo "Eureka Server is ready"
              exit 0
            fi
            echo "Waiting for Eureka Server... ($i/30)"
            sleep 2
          done
          echo "Eureka Server did not become ready in time"
          exit 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('customer_service/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 4: build the service and run tests against the already-running
      # containers, using the "ci" profile to point at localhost instead
      # of the Docker network hostnames.
      - name: Build and run tests
        working-directory: ./customer_service
        run: mvn clean verify -Dspring.profiles.active=ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-service-test-results
          path: customer_service/target/surefire-reports/

      # Step 5: always clean up containers, even if the build/test step
      # failed above - otherwise leftover containers pile up on the runner.
      - name: Stop containers
        if: always()
        run: docker compose down
