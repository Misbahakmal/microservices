name: Customer Service CI

on:
  push:
    branches: [main]
    paths:
      - 'customer_service/**'
      - 'init.sql'
      - 'docker-compose.yaml'
      - '.github/workflows/customer-service-ci.yml'

jobs:
  # ─── Job 1: Compile + Unit/Integration tests ───────────────────────────
  # This is the box that will show "Compile project" and "Unit tests"
  # style sub-steps, same as the screenshot.
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('customer_service/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            if docker exec postgres-db pg_isready -U postgres > /dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Compile project
        working-directory: ./customer_service
        run: mvn clean compile

      - name: Run tests
        working-directory: ./customer_service
        run: mvn verify -Dspring.profiles.active=ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-service-test-results
          path: customer_service/target/surefire-reports/

      - name: Stop containers
        if: always()
        run: docker compose down

  # ─── Job 2: Build Docker image ─────────────────────────────────────────
  # Only runs if build-and-test succeeds - this dependency is exactly what
  # creates the connecting arrow in the graph view.
  build-docker-image:
    name: Build Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./customer_service
        run: docker build -t customer-service:${{ github.sha }} .

  # ─── Job 3: Deploy (placeholder) ───────────────────────────────────────
  # No real deployment target exists yet for this onboarding project, so
  # this job just documents where a real deploy step would go later
  # (e.g. push to a registry, SSH to a server, kubectl apply, etc.).
  # It still shows up as a connected box in the graph view.
  deploy-backend:
    name: Deploy Backend
    needs: build-docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy (placeholder)
        run: echo "No deployment target configured yet - this step is a placeholder."
