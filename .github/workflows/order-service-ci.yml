name: Order Service CI

on:
  push:
    branches: [main]
    paths:
      - 'order_service/**'
      - 'init.sql'
      - 'docker-compose.yaml'
      - '.github/workflows/order-service-ci.yml'

jobs:
  # ─── Job 1: Compile + Unit/Integration tests ───────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('order_service/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Only Postgres and Kafka are started - customer-service is NOT
      # started, and Eureka is not needed either, because the Feign call
      # to customer-service is stubbed via WireMock inside the test itself.
      # This keeps order-service's pipeline fully independent of
      # customer-service's code/build status.
      - name: Start Postgres and Kafka
        run: docker compose up -d postgres kafka

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            if docker exec postgres-db pg_isready -U postgres > /dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Wait for Kafka to be ready
        run: |
          for i in {1..30}; do
            if docker exec kafka /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1; then
              echo "Kafka is ready"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Compile project
        working-directory: ./order_service
        run: mvn clean compile

      - name: Run tests
        working-directory: ./order_service
        run: mvn verify -Dspring.profiles.active=ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-results
          path: order_service/target/surefire-reports/

      - name: Stop containers
        if: always()
        run: docker compose down

  # ─── Job 2: Build Docker image ─────────────────────────────────────────
  build-docker-image:
    name: Build Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./order_service
        run: docker build -t order-service:${{ github.sha }} .

  # ─── Job 3: Deploy (placeholder) ───────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: build-docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy (placeholder)
        run: echo "No deployment target configured yet - this step is a placeholder."
